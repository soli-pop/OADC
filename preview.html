<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Digital Circus Menu</title><style>*{margin:0;padding:0;box-sizing:border-box}body{height:100vh;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}.background{position:fixed;inset:0;background:url('background_placeholder.jpg') center/cover no-repeat;z-index:-1}.wrapper{height:100%;display:flex;justify-content:center;align-items:center;padding:20px}.menu{display:flex;flex-direction:column;align-items:center;gap:clamp(12px,2vh,20px)}.logo-container{width:clamp(220px,60vw,500px);perspective:1000px}#logo{width:100%;height:auto;cursor:pointer}.buttons{display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2vh,16px);width:100%}.menu-btn{position:relative;width:clamp(140px,40vw,220px);padding:12px 0;border-radius:999px;border:none;font-weight:800;letter-spacing:1px;cursor:pointer;font-size:clamp(12px,2vw,16px);transform:scale(0);opacity:0;transition:transform .2s ease,filter .2s ease;overflow:hidden}.menu-btn::after{content:"";position:absolute;inset:0;background:rgba(255,255,255,.25);opacity:0;transition:opacity .2s ease;border-radius:inherit}.menu-btn:hover{transform:scale(1.08)}.menu-btn:hover::after{opacity:1}.menu-btn:active{transform:scale(.95)}.menu-btn:active::after{opacity:.2}.play{background:red;color:black}.options{background:blue;color:black}.quit{background:gold;color:black}.animate-in{animation:jellyIn 1.2s cubic-bezier(.25,.46,.45,.94) forwards}@keyframes jellyIn{0%{transform:scale(0);opacity:0}30%{transform:scale(1.5,.6);opacity:1}45%{transform:scale(.7,1.4)}60%{transform:scale(1.2,.85)}100%{transform:scale(1);opacity:1}}.animate-out{animation:jellyOut .9s cubic-bezier(.6,-.28,.735,.045) forwards}@keyframes jellyOut{0%{transform:scale(1);opacity:1}20%{transform:scale(1.6,.4)}40%{transform:scale(.4,1.6)}60%{transform:scale(1.1,.9)}85%{transform:scale(.05)}100%{transform:scale(0);opacity:0}}.animate-btn-in{animation:buttonPop .8s cubic-bezier(.34,1.56,.64,1) forwards}@keyframes buttonPop{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2,.8);opacity:1}70%{transform:scale(.9,1.1)}85%{transform:scale(1.05,.95)}100%{transform:scale(1);opacity:1}}.animate-btn-out{animation:buttonExit .6s cubic-bezier(.6,-.28,.735,.045) forwards}@keyframes buttonExit{0%{transform:scale(1);opacity:1}30%{transform:scale(.8,1.2)}60%{transform:scale(1.2,.6)}100%{transform:scale(0);opacity:0}}.menu-btn:nth-child(1){animation-delay:.4s}.menu-btn:nth-child(2){animation-delay:.6s}.menu-btn:nth-child(3){animation-delay:.8s}@media(max-width:480px){.wrapper{align-items:flex-start;padding-top:15vh}}</style></head><body><div class="background"></div><div class="wrapper"><div class="menu"><div class="logo-container"><img src="logo_placeholder.png" id="logo" alt="Digital Circus Logo"></div><div class="buttons"><button class="menu-btn play" onclick="handleClick('#play',this)">Play</button><button class="menu-btn options" onclick="handleClick('#options',this)">Options</button><button class="menu-btn quit" onclick="handleClick('#quit',this)">Quit</button></div></div></div><script>const logo=document.getElementById("logo");const buttons=Array.from(document.querySelectorAll(".menu-btn"));function triggerExit(btn){btn.classList.remove("animate-btn-in");void btn.offsetWidth;btn.classList.add("animate-btn-out")}function handleClick(link,clickedBtn){buttons.forEach(btn=>btn.disabled=true);buttons.forEach(btn=>btn.style.pointerEvents="none");triggerExit(clickedBtn);let delay=150;buttons.filter(btn=>btn!==clickedBtn).forEach((btn,index)=>{setTimeout(()=>{triggerExit(btn)},delay*(index+1))});let totalDelay=delay*buttons.length+150;setTimeout(()=>{logo.classList.remove("animate-in");void logo.offsetWidth;logo.classList.add("animate-out")},totalDelay);setTimeout(()=>{window.location.href=link},totalDelay+500)}window.addEventListener("load",()=>{buttons.forEach(btn=>btn.classList.add("animate-btn-in"));logo.classList.add("animate-in")});</script></body></html>
