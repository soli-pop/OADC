<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre of Dreams - Character Selection</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8620;
            --parchment: #fdf5e6;
            --dark-wood: #2c1e16;
            --panel-bg: rgba(253, 245, 230, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            /* Uses the red curtain background image */
            background: url('1000008933.png') no-repeat center center fixed;
            background-color: #800000;
            background-size: cover;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* WRENCH MENU */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--dark-wood);
            color: var(--gold);
            border: 2px solid var(--gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .settings-btn:hover { transform: scale(1.1); }

        .settings-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--panel-bg);
            border: 3px solid var(--gold);
            padding: 15px;
            border-radius: 8px;
            z-index: 99;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        .settings-panel.active { display: flex; }
        
        .settings-panel button, .settings-panel a {
            background: var(--dark-wood);
            color: var(--parchment);
            border: 1px solid var(--gold);
            padding: 8px 12px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* MAIN DASHBOARD */
        .dashboard {
            display: flex;
            flex-direction: row;
            background: var(--panel-bg);
            border: 5px solid var(--dark-wood);
            outline: 3px solid var(--gold);
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* ROSTER SECTION */
        .roster-section {
            flex: 1;
            padding: 20px;
            border-right: 3px solid var(--dark-wood);
            overflow-y: auto;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }

        .char-card {
            background: #e6dac3;
            border: 2px solid var(--dark-wood);
            border-radius: 5px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: bold;
        }
        .char-card:hover, .char-card.selected {
            border-color: var(--gold);
            background: var(--dark-wood);
            color: var(--gold);
        }

        /* DETAILS SECTION */
        .details-section {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            overflow-y: auto;
        }

        .char-preview-box {
            width: 200px;
            height: 200px;
            border: 4px solid var(--gold);
            background: #ccc;
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .char-preview-box img { width: 100%; height: 100%; object-fit: cover; }

        .stat-bar-bg { background: var(--dark-wood); height: 12px; width: 100%; border-radius: 6px; overflow: hidden; margin-top: 2px; }
        .stat-bar-fill { background: var(--gold); height: 100%; width: 0%; transition: width 0.5s ease-out; }

        @media (max-width: 768px) {
            .dashboard { flex-direction: column; height: 95vh; }
            .roster-section { border-right: none; border-bottom: 3px solid var(--dark-wood); }
        }
    </style>
</head>
<body>

    <audio id="bgm-audio" loop></audio>
    <audio id="sfx-audio"></audio>

    <button class="settings-btn" onclick="toggleSettings(); playSFX();">🔧</button>
    <div class="settings-panel" id="settingsPanel">
        <button onclick="toggleMute(); playSFX();" id="muteBtn">🔊 Mute BGM</button>
        <button onclick="goHome(); playSFX();">🏠 Home</button>
        <div style="border-top: 1px solid var(--gold); margin: 5px 0;"></div>
        <a href="#">Terms of Service</a>
        <a href="#">Privacy Policy</a>
    </div>

    <div class="dashboard">
        <div class="roster-section">
            <h2 style="text-align: center; border-bottom: 2px solid var(--gold);">CASTING CALL</h2>
            <div class="grid-container" id="characterGrid"></div>
            
            <div style="margin-top: 20px;">
                <label for="customImageUpload" class="char-card" style="width: 100%; aspect-ratio: auto; padding: 15px; background: #a33; color: white;" onclick="playSFX()">
                    [+] ADD ORIGINAL CHARACTER
                </label>
                <input type="file" id="customImageUpload" accept="image/*" class="hidden">
            </div>
        </div>

        <div class="details-section">
            <div class="char-preview-box">
                <img id="previewImage" src="data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22200%22%3E%3Crect%20fill%3D%22%23ccc%22%20width%3D%22200%22%20height%3D%22200%22%2F%3E%3C/svg%3E" alt="Preview">
                <label for="baseImageUpload" style="position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; padding: 5px; cursor: pointer; font-size: 0.8rem;" onclick="playSFX()">📷 Upload</label>
                <input type="file" id="baseImageUpload" accept="image/*" class="hidden">
            </div>

            <input type="text" id="charNameInput" placeholder="Enter Character Name..." style="width: 80%; padding: 10px; border: 2px solid var(--dark-wood); text-align: center; font-weight: bold;">

            <h3 id="roleDisplay" style="margin-top: 15px; color: var(--dark-gold);">Select a Role</h3>
            <div id="statsContainer" style="width: 80%; text-align: left;"></div>
            <div id="descBox" style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.05); width: 80%; text-align: left;">
                Select a character to view their dossier.
            </div>
        </div>
    </div>

    <script>
        const characters = [
            { id: "jester", roleName: "Jester", description: "Anxious and panicky newcomer.", stats: { agility: 90, stability: 20 } },
            { id: "trickster", roleName: "Trickster", description: "Chaotic mischief maker.", stats: { dexterity: 95, charisma: 85 } },
            { id: "veteran", roleName: "Veteran", description: "Paranoid chess-piece king.", stats: { experience: 100, sanity: 15 } },
            { id: "caretaker", roleName: "Caretaker", description: "Patched-up, optimistic protector.", stats: { healing: 90, morale: 95 } },
            { id: "performer", roleName: "Performer", description: "Emotionally fragile ribbon body.", stats: { energy: 50, stability: 10 } },
            { id: "ringmaster", roleName: "Ringmaster", description: "Toothy AI adventure-runner.", stats: { intelligence: 100, wisdom: 0 } }
        ];

        // FETCH SCRIPT FOR BASE64 ASSETS
        async function loadBase64Audio(filePath, audioElement) {
            try {
                const response = await fetch(filePath);
                let base64String = await response.text();
                base64String = base64String.trim().replace(/^data:audio\/\w+;base64,/, '');
                const byteArray = Uint8Array.from(atob(base64String), c => c.charCodeAt(0));
                audioElement.src = URL.createObjectURL(new Blob([byteArray], { type: 'audio/mp3' }));
            } catch (e) { console.error("Audio load failed", e); }
        }

        const bgm = document.getElementById('bgm-audio');
        const sfx = document.getElementById('sfx-audio');
        let bgmStarted = false;

        window.addEventListener('DOMContentLoaded', () => {
            loadBase64Audio('asset/selectionbg.txt', bgm); //
            loadBase64Audio('asset/bubble.txt', sfx);      //
            
            const grid = document.getElementById('characterGrid');
            characters.forEach(char => {
                const btn = document.createElement('div');
                btn.className = 'char-card';
                btn.innerText = char.roleName;
                btn.onclick = () => { playSFX(); selectCharacter(char, btn); };
                grid.appendChild(btn);
            });
        });

        function playSFX() {
            sfx.currentTime = 0;
            sfx.play();
            if(!bgmStarted && !bgm.muted) { bgm.play(); bgmStarted = true; }
        }

        function selectCharacter(char, btn) {
            document.querySelectorAll('.char-card').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('roleDisplay').innerText = char.roleName;
            document.getElementById('descBox').innerText = char.description;
            const statsDiv = document.getElementById('statsContainer');
            statsDiv.innerHTML = '';
            for (const [s, v] of Object.entries(char.stats)) {
                statsDiv.innerHTML += `<b>${s}</b><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${v}%"></div></div>`;
            }
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { document.getElementById('previewImage').src = ev.target.result; };
                reader.readAsDataURL(file);
            }
        }
        document.getElementById('baseImageUpload').addEventListener('change', handleUpload);
        document.getElementById('customImageUpload').addEventListener('change', handleUpload);

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }
        function toggleMute() { bgm.muted = !bgm.muted; document.getElementById('muteBtn').innerText = bgm.muted ? "🔇 Unmute" : "🔊 Mute"; }
        function goHome() { alert("Returning home..."); }
    </script>
</body>
</html>
