<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Menu</title>
<style>

/* ─── Reset & Base ─────────────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Trebuchet MS', 'Gill Sans', sans-serif;
}

/* ─── Background Layer ─────────────────────────────────────────────── */
#bg-container {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#intro-video,
#freeze-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

#freeze-frame {
  opacity: 0;
  transition: opacity 0.4s ease;
}

#freeze-frame.visible {
  opacity: 1;
}

/* ─── Black Fade Overlay (for exit) ────────────────────────────────── */
#fade-overlay {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s ease;
}

#fade-overlay.fading {
  opacity: 1;
  pointer-events: all;
}

/* ─── Outro Video Overlay ───────────────────────────────────────────── */
#outro-container {
  position: fixed;
  inset: 0;
  z-index: 20;
  background: #000;
  display: none;
  align-items: center;
  justify-content: center;
}

#outro-container.active {
  display: flex;
}

#outro-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

/* ─── Menu Wrapper ──────────────────────────────────────────────────── */
#menu-wrapper {
  position: fixed;
  inset: 0;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(24px, 4vh, 48px);
  padding: clamp(16px, 4vw, 40px);
  pointer-events: none; /* disabled until intro ends */
}

#menu-wrapper.ready {
  pointer-events: all;
}

/* ─── Logo ──────────────────────────────────────────────────────────── */
#logo-container {
  width: clamp(180px, 45vw, 460px);
  max-width: 90vw;
}

#logo {
  width: 100%;
  height: auto;
  display: block;
  /* hidden until intro ends */
  transform: scale(0);
  opacity: 0;
  filter: drop-shadow(0 0 24px rgba(255,255,255,0.18));
  transform-origin: center center;
  will-change: transform, opacity;
}

/* ─── Buttons ───────────────────────────────────────────────────────── */
#buttons {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(10px, 2vh, 18px);
  width: 100%;
}

.menu-btn {
  position: relative;
  width: clamp(150px, 36vw, 240px);
  padding: clamp(11px, 1.8vh, 16px) 0;
  border-radius: 999px;
  border: none;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  font-size: clamp(12px, 1.8vw, 16px);
  font-family: inherit;
  transform: scale(0);
  opacity: 0;
  transform-origin: center center;
  will-change: transform, opacity;
  overflow: hidden;
  transition: filter 0.15s ease;
  /* Gloss sheen */
  background-image: linear-gradient(
    to bottom,
    rgba(255,255,255,0.30) 0%,
    rgba(255,255,255,0.04) 55%,
    rgba(0,0,0,0.12) 100%
  );
  background-repeat: no-repeat;
  box-shadow:
    0 4px 16px rgba(0,0,0,0.40),
    0 1px 0 rgba(255,255,255,0.25) inset;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.45);
}

/* Per-button accent colors layered under the gloss */
.menu-btn.play   { background-color: #d62828; }
.menu-btn.options{ background-color: #1d4ed8; }
.menu-btn.quit   { background-color: #b45309; }

.menu-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  border-radius: inherit;
  transition: background 0.15s ease;
}

.menu-btn:hover::before   { background: rgba(255,255,255,0.12); }
.menu-btn:active::before  { background: rgba(0,0,0,0.18); }
.menu-btn:disabled        { pointer-events: none; cursor: default; }

/* ─── ANIMATION: Jelly In (Logo) ────────────────────────────────────
   Overshoots with heavy squash/stretch before settling. */
@keyframes jellyInLogo {
  0%   { transform: scale(0,0);        opacity: 0; }
  28%  { transform: scale(1.55, 0.52); opacity: 1; }  /* Wide flat squash */
  46%  { transform: scale(0.68, 1.52); }               /* Tall narrow stretch */
  60%  { transform: scale(1.22, 0.82); }               /* Overshoot wide */
  73%  { transform: scale(0.92, 1.10); }               /* Slight tall */
  84%  { transform: scale(1.06, 0.96); }               /* Nearly there */
  100% { transform: scale(1,1);         opacity: 1; }
}

/* ─── ANIMATION: Button Pop In ─────────────────────────────────────── */
@keyframes jellyInBtn {
  0%   { transform: scale(0,0);        opacity: 0; }
  32%  { transform: scale(1.45, 0.58); opacity: 1; }
  50%  { transform: scale(0.75, 1.38); }
  64%  { transform: scale(1.18, 0.86); }
  78%  { transform: scale(0.94, 1.07); }
  88%  { transform: scale(1.04, 0.97); }
  100% { transform: scale(1,1);         opacity: 1; }
}

/* ─── ANIMATION: Whirlpool Jelly Out ───────────────────────────────
   Squashes/stretches massively, then vacuum-shrinks to nothing. */
@keyframes whirlpoolOut {
  0%   { transform: scale(1,1);         opacity: 1; }
  12%  { transform: scale(1.7, 0.35);   }             /* Massive horizontal squash */
  22%  { transform: scale(0.28, 1.8);   }             /* Massive vertical stretch */
  34%  { transform: scale(1.5, 0.45);   }             /* Rebound squash */
  46%  { transform: scale(0.40, 1.55);  }             /* Rebound stretch */
  58%  { transform: scale(1.1, 0.80);   }             /* Shrinking oscillation */
  70%  { transform: scale(0.12, 0.12);  opacity: 1; } /* Rapid vacuum collapse */
  85%  { transform: scale(0.02, 0.02);  opacity: 0.4; }
  100% { transform: scale(0,0);         opacity: 0; }
}

/* Applying animations via classes */
#logo.jelly-in {
  animation: jellyInLogo 1.15s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
}

.menu-btn.jelly-in {
  animation: jellyInBtn 0.92s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
}

#logo.jelly-out {
  animation: whirlpoolOut 0.85s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
}

.menu-btn.jelly-out {
  animation: whirlpoolOut 0.72s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
}

/* ─── Stagger delays for "in" animations ───────────────────────────── */
.menu-btn:nth-child(1) { animation-delay: 0.35s; }
.menu-btn:nth-child(2) { animation-delay: 0.55s; }
.menu-btn:nth-child(3) { animation-delay: 0.75s; }

/* ─── Responsive Adjustments ────────────────────────────────────────── */

/* Tall portrait phones — push menu lower so it doesn't overlap top */
@media (max-width: 480px) and (orientation: portrait) {
  #menu-wrapper {
    justify-content: flex-end;
    padding-bottom: 12vh;
  }
  #logo-container {
    width: clamp(160px, 72vw, 320px);
  }
}

/* Ultra-wide / landscape phones */
@media (orientation: landscape) and (max-height: 500px) {
  #menu-wrapper {
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: clamp(20px, 5vw, 60px);
  }
  #logo-container {
    width: clamp(120px, 22vw, 260px);
    flex-shrink: 0;
  }
  #buttons {
    flex-direction: column;
    width: auto;
  }
  .menu-btn {
    width: clamp(130px, 22vw, 200px);
  }
}

</style>
</head>
<body>

<!-- ── Background Layer ──────────────────────────────────────────────── -->
<div id="bg-container">
  <video
    id="intro-video"
    src="intro.mp4"
    autoplay
    muted
    playsinline
    preload="auto"
  ></video>
  <img
    id="freeze-frame"
    src="freeze_frame.jpg"
    alt=""
    aria-hidden="true"
    draggable="false"
  >
</div>

<!-- ── Black Fade Overlay ────────────────────────────────────────────── -->
<div id="fade-overlay"></div>

<!-- ── Outro Video ───────────────────────────────────────────────────── -->
<div id="outro-container">
  <video
    id="outro-video"
    src="outro.mp4"
    muted
    playsinline
    preload="auto"
  ></video>
</div>

<!-- ── Menu UI ───────────────────────────────────────────────────────── -->
<div id="menu-wrapper">
  <div id="logo-container">
    <img id="logo" src="logo.png" alt="Logo" draggable="false">
  </div>
  <div id="buttons">
    <button class="menu-btn play"    data-href="#play"   >Play</button>
    <button class="menu-btn options" data-href="#options" >Options</button>
    <button class="menu-btn quit"    data-href="#quit"    >Quit</button>
  </div>
</div>

<script>
"use strict";

// ── Element refs ────────────────────────────────────────────────────────
const introVideo    = document.getElementById('intro-video');
const freezeFrame   = document.getElementById('freeze-frame');
const logo          = document.getElementById('logo');
const menuWrapper   = document.getElementById('menu-wrapper');
const fadeOverlay   = document.getElementById('fade-overlay');
const outroContainer= document.getElementById('outro-container');
const outroVideo    = document.getElementById('outro-video');
const buttons       = Array.from(document.querySelectorAll('.menu-btn'));

let isExiting = false; // guard against double-clicks

// ── Helper: force reflow to restart animations ──────────────────────────
function reflow(el) {
  void el.offsetWidth;
}

// ── Helper: safely restart an animation via class swap ─────────────────
function swapAnim(el, remove, add, delay = 0) {
  const apply = () => {
    el.classList.remove(remove);
    reflow(el);
    el.classList.add(add);
    // Neutralise any inline style from hover transitions
    el.style.transform = '';
    el.style.transition = 'none';
    reflow(el);
    el.style.transition = '';
  };
  if (delay > 0) {
    setTimeout(apply, delay);
  } else {
    apply();
  }
}

// ── SEQUENCE 1: Intro video ends → swap BG → animate menu in ───────────
function onIntroEnded() {
  // 1a. Show freeze-frame, hide video
  freezeFrame.classList.add('visible');

  // 1b. Slight delay then fade out the video element itself
  setTimeout(() => {
    introVideo.style.opacity = '0';
    introVideo.style.transition = 'opacity 0.5s ease';
  }, 80);

  // 1c. Animate logo in
  swapAnim(logo, 'jelly-out', 'jelly-in');

  // 1d. Animate buttons in (CSS stagger handles their individual delays)
  buttons.forEach(btn => {
    swapAnim(btn, 'jelly-out', 'jelly-in');
  });

  // 1e. Enable pointer events
  menuWrapper.classList.add('ready');
}

introVideo.addEventListener('ended', onIntroEnded);

// Fallback: if video fails to load/play, show menu anyway
introVideo.addEventListener('error', () => {
  console.warn('Intro video failed — showing menu immediately.');
  freezeFrame.classList.add('visible');
  onIntroEnded();
});

// Extra safety: some autoplay policies block even muted video.
// If playback never starts within 3s, trigger directly.
const autoplaySafety = setTimeout(() => {
  if (introVideo.paused || introVideo.readyState === 0) {
    console.warn('Autoplay stalled — triggering menu.');
    freezeFrame.classList.add('visible');
    onIntroEnded();
  }
}, 3000);

introVideo.addEventListener('play', () => clearTimeout(autoplaySafety));

// ── SEQUENCE 2: Button clicked → Whirlpool Out → outro → redirect ──────
function handleButtonClick(clickedBtn) {
  if (isExiting) return;
  isExiting = true;

  const href = clickedBtn.dataset.href;

  // Disable all buttons immediately
  buttons.forEach(btn => {
    btn.disabled = true;
    btn.style.pointerEvents = 'none';
  });

  // 2a. Clicked button exits first, instantly
  swapAnim(clickedBtn, 'jelly-in', 'jelly-out');

  // 2b. Other buttons exit in staggered order
  const others = buttons.filter(btn => btn !== clickedBtn);
  others.forEach((btn, i) => {
    swapAnim(btn, 'jelly-in', 'jelly-out', 110 * (i + 1));
  });

  // 2c. Logo exits last
  const logoDelay = 110 * (others.length + 1) + 80;
  swapAnim(logo, 'jelly-in', 'jelly-out', logoDelay);

  // 2d. Begin fading background to black (simultaneous with button exits)
  setTimeout(() => {
    fadeOverlay.classList.add('fading');
  }, 60);

  // 2e. After elements have cleared, play outro video
  const outroDelay = logoDelay + 500;
  setTimeout(() => {
    outroContainer.classList.add('active');
    outroVideo.play().catch(() => {
      // If outro video also fails, just redirect
      redirectTo(href);
    });

    outroVideo.addEventListener('ended', () => {
      redirectTo(href);
    }, { once: true });

    // Safety: cap outro at 10 seconds then redirect regardless
    setTimeout(() => redirectTo(href), 10000);

  }, outroDelay);
}

function redirectTo(href) {
  window.location.href = href;
}

// Attach click listeners
buttons.forEach(btn => {
  btn.addEventListener('click', () => handleButtonClick(btn));
});

</script>
</body>
</html>
